#quarkus.log.category."io.quarkus.micrometer".level=DEBUG
quarkus.log.category."io.quarkus.micrometer.runtime.binder.vertx".level=INFO

quarkus.log.category."io.quarkus.bootstrap".level=INFO
quarkus.log.category."io.quarkus.netty".level=INFO
quarkus.log.category."io.quarkus.resteasy".level=INFO

quarkus.log.category."io.netty".level=INFO
quarkus.log.category."io.restassured".level=INFO
quarkus.log.category."org.apache".level=INFO
quarkus.log.category."org.jboss.resteasy".level=INFO

quarkus.micrometer.binder.mp-metrics.enabled=true
quarkus.micrometer.export.json.enabled=true

quarkus.http.root-path=/app

# This is the old property, should still be used
quarkus.micrometer.binder.vertx.ignore-patterns=/app/message
# This is the old property, should still be used
quarkus.micrometer.binder.vertx.match-patterns=/app/message/match/\\\\d+/[0-9]+=/app/message/match/{id}/{sub},\
/app/message/match/.*=/app/message/match/{other}

pingpong/mp-rest/url=${test.url}/app